services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    hostname: n8n
    restart: unless-stopped
    env_file:
      - .env

    networks:
      - homelab

    ports:
      - "5678:5678"

    volumes:
      - ./n8n_data:/home/node/.n8n

networks:
  homelab:
    driver: bridge
    external: true
