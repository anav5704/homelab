---
- name: Create n8n service directory
  ansible.builtin.file:
    path: "{{ n8n_dir }}"
    state: directory
    mode: "0755"

- name: Copy docker-compose.yaml
  ansible.builtin.copy:
    src: docker-compose.yaml
    dest: "{{ n8n_dir }}/docker-compose.yaml"
    mode: "0644"

- name: Copy .env file
  ansible.builtin.copy:
    src: .env
    dest: "{{ n8n_dir }}/.env"
    mode: "0600"

- name: Create n8n data volume directory
  ansible.builtin.file:
    path: "{{ n8n_dir }}/n8n_data"
    state: directory
    mode: "0755"
    owner: "1000"
    group: "1000"

- name: Start n8n services
  community.docker.docker_compose_v2:
    project_src: "{{ n8n_dir }}"
